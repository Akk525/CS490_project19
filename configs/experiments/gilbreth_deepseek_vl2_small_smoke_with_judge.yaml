extends: [configs/base.yaml, configs/vllm.yaml]

experiment:
  name: gilbreth_deepseek_vl2_small_smoke_with_judge
  split: test
  filters:
    source_dataset: youcook2
    disruption_type: missing_ingredient
    disruption_modality: vision
    require_image: true
    max_examples: 8

models:
  generation_model: deepseek-ai/deepseek-vl2-small
  embedding_model: ""
  reranker_model: ""

prompting:
  type: multimodal_structured
  max_tokens: 256
  temperature: 0.2

retrieval:
  enabled: false
  use_reranker: false

evaluation:
  enable_llm_judge: true
  llm_judge_model: deepseek-ai/deepseek-vl2-small
  llm_judge_max_tokens: 128

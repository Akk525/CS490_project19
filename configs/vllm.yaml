extends: configs/base.yaml

models:
  generation_model: Qwen/Qwen2.5-VL-7B-Instruct
  embedding_model: ""
  reranker_model: ""

backends:
  generation:
    mode: openai_compatible
    timeout_seconds: 600
    openai_compatible:
      base_url_env: VLLM_OPENAI_BASE_URL
      api_key_env: VLLM_OPENAI_API_KEY
      endpoint_path: /chat/completions

retrieval:
  enabled: false
  use_reranker: false
